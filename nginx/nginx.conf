# ─────────────────────────────────────────────
# Nginx: API Gateway + Rate Limiter สำหรับ Task Board
# ─────────────────────────────────────────────

limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

resolver 8.8.8.8 8.8.4.4 valid=30s;

# ─── Upstream: local เป็นหลัก, Railway เป็น backup ───
upstream task_upstream {
    least_conn;
    server task-service-1:3002;
    server task-service-2:3002;
    server task-service-production-747e.up.railway.app:443 backup;
}

upstream auth_upstream {
    server auth-service:3001;
    server auth-service-production-7268.up.railway.app:443 backup;
}

upstream user_upstream {
    server user-service:3003;
    server user-service-production-57b1.up.railway.app:443 backup;
}

server {
    listen 8080;
    server_name localhost;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    location = /health {
        access_log off;
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    # ─── Auth routes ───
    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
    }

    # ─── /api/tasks (no trailing slash) ───
    location = /api/tasks {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass         http://task_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        add_header         X-Served-By       $upstream_addr always;
    }

    # ─── Task service health check ───
    location = /api/tasks/health {
        access_log off;

        proxy_pass         http://task_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ─── Task routes ───
    location /api/tasks/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass         http://task_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        add_header         X-Served-By       $upstream_addr always;
    }

    # ─── User service health check ───
    location = /api/users/health {
        access_log off;

        proxy_pass         http://user_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ─── User routes ───
    location /api/users/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass         http://user_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
    }

    # ─── Frontend ───
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    error_page 429 /429.json;
    location = /429.json {
        internal;
        return 429 '{"error":"Too Many Requests","message":"ส่ง request มากเกินไป กรุณารอสักครู่"}';
        add_header Content-Type application/json;
    }
}