limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

resolver 8.8.8.8 8.8.4.4 valid=30s ipv6=off;

server {
    listen 8080;
    server_name localhost;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    location = /health {
        access_log off;
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;
        set $auth_backend "https://auth-service-production-7268.up.railway.app";
        proxy_pass         $auth_backend;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header   Host              auth-service-production-7268.up.railway.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
    }

    location = /api/tasks {
        limit_req zone=api_limit burst=10 nodelay;
        set $task_backend "https://task-service-production-747e.up.railway.app";
        proxy_pass         $task_backend;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header   Host              task-service-production-747e.up.railway.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
    }

    location /api/tasks/ {
        limit_req zone=api_limit burst=10 nodelay;
        set $task_backend "https://task-service-production-747e.up.railway.app";
        proxy_pass         $task_backend;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header   Host              task-service-production-747e.up.railway.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
    }

    location /api/users/ {
        limit_req zone=api_limit burst=10 nodelay;
        set $user_backend "https://user-service-production-57b1.up.railway.app";
        proxy_pass         $user_backend;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header   Host              user-service-production-57b1.up.railway.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    error_page 429 /429.json;
    location = /429.json {
        internal;
        return 429 '{"error":"Too Many Requests","message":"ส่ง request มากเกินไป กรุณารอสักครู่"}';
        add_header Content-Type application/json;
    }
}
