<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ENGSE207 — Profile</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+Thai:wght@300;400;600&display=swap"
        rel="stylesheet" />
    <script src="env.js"></script>
    <script src="config.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0f14;
            --surface: #161920;
            --border: #2a2e3d;
            --accent: #4ade80;
            --accent2: #22d3ee;
            --danger: #f87171;
            --text: #e2e8f0;
            --muted: #64748b;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans Thai', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1rem;
            background-image:
                radial-gradient(circle at 80% 10%, rgba(34, 211, 238, .05) 0%, transparent 50%),
                radial-gradient(circle at 10% 90%, rgba(74, 222, 128, .05) 0%, transparent 50%);
        }

        .shell {
            width: 100%;
            max-width: 480px;
        }

        .logo {
            font-family: var(--mono);
            font-size: .72rem;
            color: var(--accent);
            letter-spacing: .15em;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .logo::before {
            content: '▶';
            color: var(--accent2);
        }

        .nav-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .nav-row h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            gap: .75rem;
        }

        a.link {
            font-family: var(--mono);
            font-size: .72rem;
            color: var(--muted);
            text-decoration: none;
        }

        a.link:hover {
            color: var(--text);
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
        }

        /* Avatar area */
        .avatar-section {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-bottom: 1.8rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: grid;
            place-items: center;
            font-family: var(--mono);
            font-size: 1.3rem;
            font-weight: 600;
            color: #000;
            flex-shrink: 0;
        }

        .avatar-info {
            flex: 1;
        }

        .avatar-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: .2rem;
        }

        .role-badge {
            display: inline-block;
            font-family: var(--mono);
            font-size: .65rem;
            padding: .15rem .5rem;
            border-radius: 4px;
            background: rgba(34, 211, 238, .12);
            color: var(--accent2);
            border: 1px solid rgba(34, 211, 238, .25);
        }

        .role-badge.admin {
            background: rgba(74, 222, 128, .12);
            color: var(--accent);
            border-color: rgba(74, 222, 128, .25);
        }

        /* Form */
        .section-title {
            font-family: var(--mono);
            font-size: .7rem;
            color: var(--muted);
            letter-spacing: .1em;
            margin-bottom: 1.2rem;
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        label {
            display: block;
            font-family: var(--mono);
            font-size: .68rem;
            color: var(--muted);
            letter-spacing: .1em;
            margin-bottom: .4rem;
        }

        input,
        textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: .65rem .85rem;
            color: var(--text);
            font-family: var(--mono);
            font-size: .85rem;
            outline: none;
            transition: border-color .2s;
            resize: none;
        }

        input:focus,
        textarea:focus {
            border-color: var(--accent);
        }

        input:disabled,
        textarea:disabled {
            opacity: .5;
        }

        .btn-primary {
            width: 100%;
            padding: .72rem;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 6px;
            font-family: var(--mono);
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: .5rem;
            transition: opacity .2s;
        }

        .btn-primary:hover {
            opacity: .85;
        }

        .btn-primary:disabled {
            opacity: .4;
            cursor: default;
        }

        .msg {
            margin-top: 1rem;
            padding: .6rem .85rem;
            border-radius: 6px;
            font-family: var(--mono);
            font-size: .75rem;
            display: none;
        }

        .msg.error {
            background: rgba(248, 113, 113, .12);
            border: 1px solid var(--danger);
            color: var(--danger);
            display: block;
        }

        .msg.success {
            background: rgba(74, 222, 128, .1);
            border: 1px solid var(--accent);
            color: var(--accent);
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(0, 0, 0, .3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Admin table */
        #admin-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .section-label {
            font-family: var(--mono);
            font-size: .68rem;
            color: var(--accent2);
            letter-spacing: .12em;
            margin-bottom: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .78rem;
        }

        th {
            font-family: var(--mono);
            font-size: .63rem;
            color: var(--muted);
            letter-spacing: .08em;
            text-align: left;
            padding: .4rem .6rem;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: .5rem .6rem;
            border-bottom: 1px solid rgba(42, 46, 61, .5);
        }

        tr:hover td {
            background: rgba(255, 255, 255, .02);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <div class="shell" id="app-shell">
        <div class="logo">ENGSE207 · MICROSERVICES LAB</div>

        <div class="nav-row">
            <h2>โปรไฟล์</h2>
            <div class="nav-links">
                <a class="link" href="index.html">← กลับหน้าหลัก</a>
                <a class="link" href="#" onclick="doLogout()">ออกจากระบบ</a>
            </div>
        </div>

        <div class="panel">
            <!-- Avatar -->
            <div class="avatar-section">
                <div class="avatar" id="avatar-letter">?</div>
                <div class="avatar-info">
                    <div class="avatar-name" id="display-name-show">กำลังโหลด…</div>
                    <span class="role-badge" id="role-badge">member</span>
                </div>
            </div>

            <!-- Edit profile form -->
            <div class="section-title">// แก้ไขโปรไฟล์</div>

            <div class="form-group">
                <label>DISPLAY NAME</label>
                <input type="text" id="display_name" placeholder="ชื่อที่แสดง" />
            </div>

            <div class="form-group">
                <label>BIO</label>
                <textarea id="bio" rows="3" placeholder="แนะนำตัวสั้นๆ…"></textarea>
            </div>

            <div class="form-group">
                <label>AVATAR URL</label>
                <input type="url" id="avatar_url" placeholder="https://…" />
            </div>

            <!-- Read-only fields -->
            <div class="form-group">
                <label>USERNAME (แก้ไขไม่ได้)</label>
                <input type="text" id="username-ro" disabled />
            </div>

            <div class="form-group">
                <label>EMAIL (แก้ไขไม่ได้)</label>
                <input type="email" id="email-ro" disabled />
            </div>

            <button class="btn-primary" id="save-btn" onclick="saveProfile()">บันทึกการเปลี่ยนแปลง</button>
            <div class="msg" id="profile-msg"></div>
        </div>

        <!-- Admin: user list -->
        <div id="admin-section" class="hidden"
            style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;margin-top:1.5rem;">
            <div class="section-label">// ADMIN — รายชื่อผู้ใช้ทั้งหมด</div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>USERNAME</th>
                        <th>EMAIL</th>
                        <th>ROLE</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    <tr>
                        <td colspan="4" style="color:var(--muted)">กำลังโหลด…</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
  let currentProfile = {};

  // ── Boot ────────────────────────────────────────────────
  (async () => {
    const token = getToken();
    if (!token) { window.location.href = '/index.html'; return; }

    try {
      const data = await apiFetch(`${CONFIG.USER_SERVICE_URL}/api/users/me`);
      const profile = data.profile || data;
      currentProfile = profile;
      renderProfile(profile);

      if (profile.role === 'admin') {
        loadAllUsers();
      }
    } catch (err) {
      window.location.href = '/index.html';
    }
  })();

  function renderProfile(p) {
    const name = p.display_name || p.username || p.email || 'User';
    document.getElementById('avatar-letter').textContent = name.charAt(0).toUpperCase();
    document.getElementById('display-name-show').textContent = name;

    const badge = document.getElementById('role-badge');
    badge.textContent = p.role || 'member';
    if (p.role === 'admin') badge.classList.add('admin');

    document.getElementById('display_name').value = p.display_name || '';
    document.getElementById('bio').value           = p.bio || '';
    document.getElementById('avatar_url').value    = p.avatar_url || '';
    document.getElementById('username-ro').value   = p.username || '';
    document.getElementById('email-ro').value      = p.email || '';
  }

  // ── Save profile ─────────────────────────────────────────
  async function saveProfile() {
    const btn = document.getElementById('save-btn');
    const msg = document.getElementById('profile-msg');
    msg.className = 'msg';

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>กำลังบันทึก…';

    try {
      const body = {
        display_name: document.getElementById('display_name').value.trim(),
        bio:          document.getElementById('bio').value.trim(),
        avatar_url:   document.getElementById('avatar_url').value.trim(),
      };

      const data = await apiFetch(`${CONFIG.USER_SERVICE_URL}/api/users/me`, {
        method: 'PUT',
        body: JSON.stringify(body),
      });

      const updated = data.profile || data;
      renderProfile({ ...currentProfile, ...updated });
      currentProfile = { ...currentProfile, ...updated };

      showMsg(msg, 'บันทึกสำเร็จ!', 'success');
    } catch (err) {
      showMsg(msg, err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'บันทึกการเปลี่ยนแปลง';
    }
  }

  // ── Admin: load all users ────────────────────────────────
  async function loadAllUsers() {
    document.getElementById('admin-section').classList.remove('hidden');
    const tbody = document.getElementById('user-table-body');

    try {
      const data = await apiFetch(`${CONFIG.USER_SERVICE_URL}/api/users`);
      const users = Array.isArray(data) ? data : (data.users || []);

      tbody.innerHTML = users.map(u => `
        <tr>
          <td style="color:var(--muted)">${escHtml(String(u.id || u.user_id || '-'))}</td>
          <td>${escHtml(u.username || '-')}</td>
          <td style="color:var(--muted)">${escHtml(u.email || '-')}</td>
          <td>
            <span class="role-badge ${u.role === 'admin' ? 'admin' : ''}">
              ${escHtml(u.role || 'member')}
            </span>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="4" style="color:var(--danger);font-family:var(--mono)">${escHtml(err.message)}</td></tr>`;
    }
  }

  // ── Logout ───────────────────────────────────────────────
  function doLogout() {
    removeToken();
    window.location.href = '/index.html';
  }

  // ── Helpers ──────────────────────────────────────────────
  function showMsg(el, text, type) {
    el.className = `msg ${type}`;
    el.textContent = text;
  }

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
    </script>
</body>

</html>
