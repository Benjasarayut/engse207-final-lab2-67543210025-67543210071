<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Profile 🌷 — Task Board</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap"
        rel="stylesheet" />
    <script src="env.js"></script>
    <script src="config.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #fdf6f0;
            --sidebar: #fff8f5;
            --surface: #ffffff;
            --surface2: #fef3ee;
            --border: #f0d9cc;
            --accent: #e8637a;
            --accent2: #f4a261;
            --green: #52b788;
            --pink: #f9c6d0;
            --danger: #e05c6e;
            --warn: #f4a261;
            --text: #3d2c2c;
            --muted: #9e7e7e;
            --font: 'Sarabun', sans-serif;
            --display: 'Playfair Display', serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(249, 198, 208, .3) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(200, 182, 226, .2) 0%, transparent 40%);
        }

        .petal {
            position: fixed;
            pointer-events: none;
            font-size: 1.2rem;
            animation: fall linear infinite;
            opacity: .5;
            z-index: 0;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: .6
            }

            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0
            }
        }

        .app {
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            overflow-y: auto;
            background: var(--sidebar);
            border-right: 1.5px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: 2px 0 20px rgba(232, 99, 122, .06);
        }

        .sb-brand {
            display: flex;
            align-items: center;
            gap: .7rem;
            padding: 1.3rem 1.2rem 1rem;
            border-bottom: 1.5px solid var(--border);
        }

        .sb-brand-name {
            font-family: var(--display);
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent);
        }

        .sb-nav {
            padding: .75rem .6rem;
            flex: 1;
        }

        .sb-item {
            display: flex;
            align-items: center;
            gap: .65rem;
            padding: .65rem .85rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: .88rem;
            font-weight: 500;
            color: var(--muted);
            transition: all .2s;
            text-decoration: none;
            margin-bottom: .2rem;
        }

        .sb-item:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .sb-item.active {
            background: linear-gradient(135deg, rgba(232, 99, 122, .12), rgba(244, 162, 97, .08));
            color: var(--accent);
            font-weight: 600;
        }

        .sb-item-icon {
            font-size: 1.1rem;
            width: 22px;
            text-align: center;
        }

        .sb-footer {
            padding: 1rem;
            border-top: 1.5px solid var(--border);
        }

        .sb-user {
            display: flex;
            align-items: center;
            gap: .65rem;
        }

        .sb-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: grid;
            place-items: center;
            font-size: .9rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 3px 10px rgba(232, 99, 122, .3);
        }

        .sb-uname {
            font-size: .85rem;
            font-weight: 600;
            color: var(--text);
        }

        .sb-role-badge {
            display: inline-block;
            font-size: .6rem;
            font-weight: 700;
            padding: .1rem .4rem;
            border-radius: 4px;
            background: rgba(232, 99, 122, .12);
            color: var(--accent);
        }

        .sb-role-badge.admin {
            background: rgba(244, 162, 97, .15);
            color: var(--warn);
        }

        .sb-logout {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1rem;
            padding: .2rem;
        }

        .sb-logout:hover {
            color: var(--danger);
        }

        .main {
            flex: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-header {
            padding: 1.5rem 2rem 1rem;
            border-bottom: 1.5px solid var(--border);
            background: rgba(255, 255, 255, .7);
            backdrop-filter: blur(8px);
        }

        .main-header-sub {
            font-size: .7rem;
            color: var(--muted);
            letter-spacing: .08em;
            margin-bottom: .1rem;
        }

        .main-title {
            font-family: var(--display);
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent);
        }

        .main-body {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            width: 100%;
            padding: 0;
        }

        .card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 18px;
            padding: 1.6rem;
            margin-bottom: 1.4rem;
            box-shadow: 0 4px 20px rgba(232, 99, 122, .06);
        }

        .profile-top {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding-bottom: 1.2rem;
            border-bottom: 1.5px solid var(--border);
            margin-bottom: 1.4rem;
        }

        .p-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: grid;
            place-items: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(232, 99, 122, .3);
        }

        .p-name {
            font-family: var(--display);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: .3rem;
        }

        .p-role {
            display: inline-block;
            font-size: .68rem;
            font-weight: 700;
            padding: .15rem .6rem;
            border-radius: 20px;
            background: rgba(232, 99, 122, .1);
            color: var(--accent);
        }

        .p-role.admin {
            background: rgba(244, 162, 97, .15);
            color: var(--warn);
        }

        .section-label {
            font-size: .68rem;
            font-weight: 700;
            letter-spacing: .1em;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .fg {
            margin-bottom: 1rem;
        }

        .fg label {
            display: block;
            font-size: .7rem;
            font-weight: 700;
            letter-spacing: .08em;
            color: var(--muted);
            margin-bottom: .35rem;
        }

        .fg input,
        .fg textarea {
            width: 100%;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: .65rem 1rem;
            color: var(--text);
            font-family: var(--font);
            font-size: .88rem;
            outline: none;
            transition: all .2s;
        }

        .fg input:focus,
        .fg textarea:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(232, 99, 122, .1);
        }

        .fg input:disabled {
            opacity: .5;
            background: var(--bg);
        }

        .fg textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-save {
            width: 100%;
            padding: .78rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: var(--font);
            font-size: .92rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            box-shadow: 0 4px 15px rgba(232, 99, 122, .25);
        }

        .btn-save:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(232, 99, 122, .35);
        }

        .btn-save:disabled {
            opacity: .5;
            transform: none;
        }

        .msg {
            margin-top: .75rem;
            padding: .55rem 1rem;
            border-radius: 10px;
            font-size: .78rem;
            display: none;
        }

        .msg.err {
            background: rgba(224, 92, 110, .08);
            border: 1.5px solid var(--danger);
            color: var(--danger);
            display: block;
        }

        .msg.ok {
            background: rgba(82, 183, 136, .08);
            border: 1.5px solid var(--green);
            color: var(--green);
            display: block;
        }

        .jwt-box {
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: .7rem;
            color: var(--accent);
            word-break: break-all;
            line-height: 1.6;
            margin-bottom: .75rem;
        }

        .btn-copy {
            padding: .42rem 1rem;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-family: var(--font);
            font-size: .78rem;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-copy:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .admin-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(232, 99, 122, .06);
        }

        .admin-card-hdr {
            padding: 1rem 1.4rem;
            border-bottom: 1.5px solid var(--border);
            font-size: .7rem;
            font-weight: 700;
            letter-spacing: .1em;
            color: var(--accent);
            background: var(--surface2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: .7rem 1.1rem;
            font-size: .68rem;
            font-weight: 700;
            letter-spacing: .07em;
            color: var(--muted);
            text-align: left;
            border-bottom: 1.5px solid var(--border);
            background: var(--surface2);
        }

        td {
            padding: .7rem 1.1rem;
            font-size: .83rem;
            border-bottom: 1px solid rgba(240, 217, 204, .5);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(249, 198, 208, .05);
        }

        .badge {
            display: inline-block;
            font-size: .62rem;
            font-weight: 700;
            padding: .18rem .55rem;
            border-radius: 20px;
        }

        .b-admin {
            background: rgba(244, 162, 97, .15);
            color: var(--warn);
        }

        .b-member {
            background: rgba(232, 99, 122, .1);
            color: var(--accent);
        }

        /* custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--pink), var(--accent2));
            border-radius: 20px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--accent), var(--accent2));
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: #f9c6d0 transparent;
        }

        .inner {
            padding: 1.4rem 2rem;
            max-width: 600px;
        }

        .avatar-upload {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }

        .avatar-upload:hover .avatar-overlay {
            opacity: 1;
        }

        .avatar-overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(232, 99, 122, .5);
            display: grid;
            place-items: center;
            opacity: 0;
            transition: opacity .2s;
            font-size: 1.2rem;
        }

        .avatar-input {
            display: none;
        }

        .avatar-preview {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(232, 99, 122, .3);
        }

        .hidden {
            display: none !important;
        }

        .spin {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, .4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: sp .5s linear infinite;
            vertical-align: middle;
            margin-right: 5px;
        }

        @keyframes sp {
            to {
                transform: rotate(360deg)
            }
        }
    </style>
</head>

<body>
    <script>
        ['🌸', '🌷', '🌼'].forEach((p, i) => {
            [15, 45, 75].forEach((left, j) => {
                const el = document.createElement('div');
                el.className = 'petal'; el.textContent = p;
                el.style.cssText = `left:${left}%;animation-duration:${7 + i * 2}s;animation-delay:${j * 2}s;font-size:.9rem`;
                document.body.appendChild(el);
            });
        });
    </script>

    <div class="app">
        <div class="sidebar">
            <div class="sb-brand"><span>🌸</span><span class="sb-brand-name">Task Board</span></div>
            <nav class="sb-nav">
                <a class="sb-item" href="index.html"><span class="sb-item-icon">✅</span> Tasks</a>
                <a class="sb-item active"><span class="sb-item-icon">🌷</span> Profile &amp; JWT</a>
            </nav>
            <div class="sb-footer">
                <div class="sb-user">
                    <div class="sb-avatar" id="sb-av">?</div>
                    <div>
                        <div class="sb-uname" id="sb-name">-</div><span class="sb-role-badge" id="sb-role">member</span>
                    </div>
                    <button class="sb-logout" onclick="doLogout()">✕</button>
                </div>
            </div>
        </div>

        <div class="main">
            <div class="main-header">
                <div class="main-header-sub">🌿 ACCOUNT</div>
                <div class="main-title">Profile &amp; JWT</div>
            </div>
            <div class="main-body">
                <div class="inner">

                    <div class="card">
                        <div class="profile-top">
                            <label class="avatar-upload" title="คลิกเพื่อเปลี่ยนรูป">
                                <img id="p-av-img" class="avatar-preview" src="" style="display:none" />
                                <div class="p-avatar" id="p-av" style="display:grid">?</div>
                                <div class="avatar-overlay">📷</div>
                                <input type="file" class="avatar-input" id="avatar-file" accept="image/*"
                                    onchange="onAvatarFile(event)" />
                            </label>
                            <div>
                                <div class="p-name" id="p-name">-</div><span class="p-role" id="p-role">member</span>
                            </div>
                        </div>
                        <div class="section-label">🌸 แก้ไขโปรไฟล์</div>
                        <div class="fg"><label>DISPLAY NAME</label><input id="p-display" placeholder="ชื่อที่แสดง" />
                        </div>
                        <div class="fg"><label>BIO</label><textarea id="p-bio" placeholder="แนะนำตัวสั้นๆ…"></textarea>
                        </div>
                        <div class="fg" id="avatar-url-group"><label>AVATAR URL <span
                                    style="font-size:.65rem;color:var(--muted)">(หรืออัปโหลดรูปด้านบน)</span></label><input
                                id="p-avatar" type="url" placeholder="https://…" /></div>
                        <div class="fg"><label>USERNAME (แก้ไขไม่ได้)</label><input id="p-uname" disabled /></div>
                        <div class="fg"><label>EMAIL (แก้ไขไม่ได้)</label><input id="p-email" disabled /></div>
                        <button class="btn-save" id="save-btn" onclick="saveProfile()">🌸 บันทึกการเปลี่ยนแปลง</button>
                        <div class="msg" id="p-msg"></div>
                    </div>

                    <div class="card">
                        <div class="section-label">🔑 JWT Token</div>
                        <div class="jwt-box" id="jwt-box">-</div>
                        <button class="btn-copy" onclick="copyJwt()">📋 คัดลอก Token</button>
                    </div>

                    <div class="admin-card hidden" id="admin-card">
                        <div class="admin-card-hdr">👑 ADMIN — รายชื่อผู้ใช้ทั้งหมด</div>
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>USERNAME</th>
                                    <th>EMAIL</th>
                                    <th>ROLE</th>
                                </tr>
                            </thead>
                            <tbody id="user-tbody">
                                <tr>
                                    <td colspan="4" style="text-align:center;padding:1.5rem;color:var(--muted)">🌸
                                        กำลังโหลด…</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        (async () => {
            const token = getToken();
            if (!token) { location.href = '/index.html'; return; }
            document.getElementById('jwt-box').textContent = token;
            try {
                const d = await apiFetch(`${CONFIG.USER_SERVICE_URL}/api/users/me`);
                const p = d.profile || d; renderProfile(p);
                if (p.role === 'admin') { document.getElementById('admin-card').classList.remove('hidden'); loadUsers(); }
            } catch (e) { location.href = '/index.html'; }
        })();


        function onAvatarFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) { alert('รูปต้องไม่เกิน 2MB'); return; }
            const reader = new FileReader();
            reader.onload = (ev) => {
                const base64 = ev.target.result;
                document.getElementById('p-av-img').src = base64;
                document.getElementById('p-av-img').style.display = 'block';
                document.getElementById('p-av').style.display = 'none';
                document.getElementById('p-avatar').value = base64;
                // ซ่อน field ถ้าเป็น base64 (ยาวเกิน)
                document.getElementById('avatar-url-group').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        function renderProfile(p) {
            const name = p.display_name || p.username || 'User';
            ['sb-av', 'p-av'].forEach(id => document.getElementById(id).textContent = name.charAt(0).toUpperCase());
            document.getElementById('sb-name').textContent = name;
            document.getElementById('p-name').textContent = name;
            const pr = document.getElementById('p-role'); pr.textContent = p.role || 'member'; pr.className = 'p-role' + (p.role === 'admin' ? ' admin' : '');
            const sr = document.getElementById('sb-role'); sr.textContent = p.role || 'member'; sr.className = 'sb-role-badge' + (p.role === 'admin' ? ' admin' : '');
            const grp = document.getElementById('avatar-url-group');
            if (p.avatar_url && p.avatar_url.startsWith('data:')) {
                grp.style.display = 'none';
            } else {
                grp.style.display = 'block';
            }
            if (p.avatar_url) {
                const img = document.getElementById('p-av-img');
                img.src = p.avatar_url; img.style.display = 'block';
                document.getElementById('p-av').style.display = 'none';
            }
            document.getElementById('p-display').value = p.display_name || '';
            document.getElementById('p-bio').value = p.bio || '';
            document.getElementById('p-avatar').value = p.avatar_url || '';
            document.getElementById('p-uname').value = p.username || '';
            document.getElementById('p-email').value = p.email || '';
        }

        async function saveProfile() {
            const btn = document.getElementById('save-btn'), msg = document.getElementById('p-msg');
            msg.className = 'msg'; btn.disabled = true; btn.innerHTML = '<span class="spin"></span>กำลังบันทึก…';
            try {
                const d = await apiFetch(`${CONFIG.USER_SERVICE_URL}/api/users/me`, {
                    method: 'PUT', body: JSON.stringify({
                        display_name: document.getElementById('p-display').value.trim(),
                        bio: document.getElementById('p-bio').value.trim(),
                        avatar_url: document.getElementById('p-avatar').value.trim(),
                    })
                });
                renderProfile(d.profile || d); msg.className = 'msg ok'; msg.textContent = '🌸 บันทึกสำเร็จ!';
            } catch (e) { msg.className = 'msg err'; msg.textContent = e.message; }
            finally { btn.disabled = false; btn.innerHTML = '🌸 บันทึกการเปลี่ยนแปลง'; }
        }

        async function loadUsers() {
            const tbody = document.getElementById('user-tbody');
            try {
                const d = await apiFetch(`${CONFIG.USER_SERVICE_URL}/api/users`);
                const users = Array.isArray(d) ? d : (d.users || []);
                tbody.innerHTML = users.map(u => `<tr>
        <td style="color:var(--muted)">${u.user_id || u.id}</td>
        <td style="font-weight:600">${u.username || '-'}</td>
        <td style="color:var(--muted)">${u.email || '-'}</td>
        <td><span class="badge b-${u.role || 'member'}">${u.role || 'member'}</span></td>
      </tr>`).join('');
            } catch (e) { tbody.innerHTML = `<tr><td colspan="4" style="color:var(--danger);text-align:center;padding:1rem">${e.message}</td></tr>`; }
        }

        function copyJwt() { navigator.clipboard.writeText(getToken() || '').then(() => alert('🌸 คัดลอก Token แล้ว!')); }
        function doLogout() { removeToken(); location.href = '/index.html'; }
    </script>
</body>

</html>
