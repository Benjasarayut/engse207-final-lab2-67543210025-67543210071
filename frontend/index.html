<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENGSE207 — Task Manager</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+Thai:wght@300;400;600&display=swap"
    rel="stylesheet" />
  <script src="env.js"></script>
  <script src="config.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --border: #2a2e3d;
      --accent: #4ade80;
      --accent2: #22d3ee;
      --danger: #f87171;
      --text: #e2e8f0;
      --muted: #64748b;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans Thai', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(74, 222, 128, .06) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(34, 211, 238, .05) 0%, transparent 50%);
    }

    .shell {
      width: 100%;
      max-width: 420px;
    }

    .logo {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--accent);
      letter-spacing: .15em;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .logo::before {
      content: '▶';
      color: var(--accent2);
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: .4rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: .85rem;
      margin-bottom: 2rem;
    }

    /* Tab switcher */
    .tabs {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 1.8rem;
    }

    .tab-btn {
      flex: 1;
      padding: .6rem;
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--mono);
      font-size: .8rem;
      cursor: pointer;
      transition: all .2s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #000;
      font-weight: 600;
    }

    /* Form */
    .form-group {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--muted);
      letter-spacing: .1em;
      margin-bottom: .4rem;
    }

    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .65rem .85rem;
      color: var(--text);
      font-family: var(--mono);
      font-size: .88rem;
      outline: none;
      transition: border-color .2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      padding: .75rem;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: .5rem;
      transition: opacity .2s, transform .1s;
    }

    .btn-primary:hover {
      opacity: .85;
    }

    .btn-primary:active {
      transform: scale(.99);
    }

    .btn-primary:disabled {
      opacity: .4;
      cursor: default;
    }

    /* Message */
    .msg {
      margin-top: 1rem;
      padding: .6rem .85rem;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: .78rem;
      display: none;
    }

    .msg.error {
      background: rgba(248, 113, 113, .12);
      border: 1px solid var(--danger);
      color: var(--danger);
      display: block;
    }

    .msg.success {
      background: rgba(74, 222, 128, .1);
      border: 1px solid var(--accent);
      color: var(--accent);
      display: block;
    }

    /* Panel */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
    }

    .hidden {
      display: none !important;
    }

    /* Task list */
    #task-section {
      margin-top: 2rem;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .section-title {
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--accent2);
      letter-spacing: .12em;
    }

    .btn-sm {
      padding: .35rem .75rem;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: var(--mono);
      font-size: .72rem;
      cursor: pointer;
      transition: background .2s;
    }

    .btn-sm:hover {
      background: #2e3347;
    }

    .btn-danger {
      border-color: var(--danger);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: rgba(248, 113, 113, .12);
    }

    .task-input-row {
      display: flex;
      gap: .5rem;
      margin-bottom: 1rem;
    }

    .task-input-row input {
      flex: 1;
    }

    .task-list {
      list-style: none;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .65rem .85rem;
      border: 1px solid var(--border);
      border-radius: 7px;
      margin-bottom: .5rem;
      font-size: .85rem;
      transition: border-color .2s;
    }

    .task-item:hover {
      border-color: #3a3e52;
    }

    .badge {
      font-family: var(--mono);
      font-size: .65rem;
      padding: .15rem .45rem;
      border-radius: 4px;
      margin-left: auto;
    }

    .badge-todo {
      background: rgba(100, 116, 139, .2);
      color: var(--muted);
    }

    .badge-done {
      background: rgba(74, 222, 128, .15);
      color: var(--accent);
    }

    .task-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: .9rem;
      padding: 0 .2rem;
      line-height: 1;
    }

    .task-del:hover {
      color: var(--danger);
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .user-tag {
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--muted);
    }

    .user-tag span {
      color: var(--accent2);
    }

    .nav-links {
      display: flex;
      gap: .75rem;
    }

    a.link {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      text-decoration: none;
    }

    a.link:hover {
      color: var(--text);
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0, 0, 0, .3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <!-- ===== AUTH PANEL ===== -->
  <div class="shell" id="auth-shell">
    <div class="logo">ENGSE207 · MICROSERVICES LAB</div>
    <h1>Task<br />Manager</h1>
    <p class="subtitle">Microservices Final Lab — Set 2</p>

    <div class="panel">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">เข้าสู่ระบบ</button>
        <button class="tab-btn" onclick="switchTab('register')">สมัครสมาชิก</button>
      </div>

      <!-- Login Form -->
      <div id="login-form">
        <div class="form-group">
          <label>EMAIL</label>
          <input type="email" id="login-email" placeholder="user@example.com" />
        </div>
        <div class="form-group">
          <label>PASSWORD</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" id="login-btn" onclick="doLogin()">เข้าสู่ระบบ</button>
        <div class="msg" id="login-msg"></div>
      </div>

      <!-- Register Form -->
      <div id="register-form" class="hidden">
        <div class="form-group">
          <label>USERNAME</label>
          <input type="text" id="reg-username" placeholder="johndoe" />
        </div>
        <div class="form-group">
          <label>EMAIL</label>
          <input type="email" id="reg-email" placeholder="user@example.com" />
        </div>
        <div class="form-group">
          <label>PASSWORD</label>
          <input type="password" id="reg-password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" id="reg-btn" onclick="doRegister()">สมัครสมาชิก</button>
        <div class="msg" id="reg-msg"></div>
      </div>
    </div>
  </div>

  <!-- ===== MAIN APP ===== -->
  <div class="shell hidden" id="app-shell">
    <div class="logo">ENGSE207 · MICROSERVICES LAB</div>

    <div class="nav-row">
      <div class="user-tag">สวัสดี, <span id="username-display">-</span></div>
      <div class="nav-links">
        <a class="link" href="profile.html">โปรไฟล์</a>
        <a class="link" href="#" onclick="doLogout()">ออกจากระบบ</a>
      </div>
    </div>

    <!-- Add task -->
    <div class="section-header">
      <span class="section-title">// TASKS</span>
      <button class="btn-sm" onclick="loadTasks()">↺ รีเฟรช</button>
    </div>

    <div class="task-input-row">
      <input type="text" id="new-task-title" placeholder="ชื่องาน..." onkeydown="if(event.key==='Enter')addTask()" />
      <button class="btn-sm" onclick="addTask()">+ เพิ่ม</button>
    </div>

    <div class="msg" id="task-msg"></div>
    <ul class="task-list" id="task-list"></ul>
  </div>

  <script>
    // ── Tab switch ──────────────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
    }

    // ── Login ───────────────────────────────────────────────
    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');
      const msg = document.getElementById('login-msg');
      msg.className = 'msg';

      if (!email || !password) { showMsg(msg, 'กรอกข้อมูลให้ครบ', 'error'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>กำลังเข้าสู่ระบบ…';

      try {
        const data = await apiFetch(`${CONFIG.AUTH_SERVICE_URL}/api/auth/login`, {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });
        setToken(data.token);
        enterApp(data.user || {});
      } catch (err) {
        showMsg(msg, err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'เข้าสู่ระบบ';
      }
    }

    // ── Register ────────────────────────────────────────────
    async function doRegister() {
      const username = document.getElementById('reg-username').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const btn = document.getElementById('reg-btn');
      const msg = document.getElementById('reg-msg');
      msg.className = 'msg';

      if (!username || !email || !password) { showMsg(msg, 'กรอกข้อมูลให้ครบ', 'error'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>กำลังสมัคร…';

      try {
        await apiFetch(`${CONFIG.AUTH_SERVICE_URL}/api/auth/register`, {
          method: 'POST',
          body: JSON.stringify({ username, email, password }),
        });
        showMsg(msg, 'สมัครสำเร็จ! กรุณาเข้าสู่ระบบ', 'success');
        setTimeout(() => switchTab('login'), 1500);
      } catch (err) {
        showMsg(msg, err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'สมัครสมาชิก';
      }
    }

    // ── App entry ────────────────────────────────────────────
    function enterApp(user) {
      document.getElementById('auth-shell').classList.add('hidden');
      document.getElementById('app-shell').classList.remove('hidden');
      document.getElementById('username-display').textContent = user.username || user.email || 'user';
      loadTasks();
    }

    // ── Load tasks ───────────────────────────────────────────
    async function loadTasks() {
      const list = document.getElementById('task-list');
      list.innerHTML = '<li style="color:var(--muted);font-size:.8rem;font-family:var(--mono)">กำลังโหลด…</li>';
      try {
        const data = await apiFetch(`${CONFIG.TASK_SERVICE_URL}/api/tasks`);
        const tasks = Array.isArray(data) ? data : (data.tasks || []);
        renderTasks(tasks);
      } catch (err) {
        list.innerHTML = `<li style="color:var(--danger);font-size:.78rem;font-family:var(--mono)">${err.message}</li>`;
      }
    }

    function renderTasks(tasks) {
      const list = document.getElementById('task-list');
      if (!tasks.length) {
        list.innerHTML = '<li style="color:var(--muted);font-size:.8rem;font-family:var(--mono)">ยังไม่มีงาน</li>';
        return;
      }
      list.innerHTML = tasks.map(t => `
      <li class="task-item">
        <span>${escHtml(t.title)}</span>
        <span class="badge badge-${t.status === 'DONE' ? 'done' : 'todo'}">${t.status || 'TODO'}</span>
        <button class="task-del" onclick="deleteTask(${t.id})" title="ลบ">✕</button>
      </li>
    `).join('');
    }

    // ── Add task ─────────────────────────────────────────────
    async function addTask() {
      const input = document.getElementById('new-task-title');
      const msg = document.getElementById('task-msg');
      const title = input.value.trim();
      msg.className = 'msg';
      if (!title) return;

      try {
        await apiFetch(`${CONFIG.TASK_SERVICE_URL}/api/tasks`, {
          method: 'POST',
          body: JSON.stringify({ title, status: 'TODO', priority: 'medium' }),
        });
        input.value = '';
        loadTasks();
      } catch (err) {
        showMsg(msg, err.message, 'error');
      }
    }

    // ── Delete task ──────────────────────────────────────────
    async function deleteTask(id) {
      const msg = document.getElementById('task-msg');
      msg.className = 'msg';
      try {
        await apiFetch(`${CONFIG.TASK_SERVICE_URL}/api/tasks/${id}`, { method: 'DELETE' });
        loadTasks();
      } catch (err) {
        showMsg(msg, err.message, 'error');
      }
    }

    // ── Logout ───────────────────────────────────────────────
    function doLogout() {
      removeToken();
      document.getElementById('app-shell').classList.add('hidden');
      document.getElementById('auth-shell').classList.remove('hidden');
    }

    // ── Helpers ──────────────────────────────────────────────
    function showMsg(el, text, type) {
      el.className = `msg ${type}`;
      el.textContent = text;
    }

    function escHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // ── Auto-login if token exists ───────────────────────────
    (async () => {
      const token = getToken();
      if (!token) return;
      try {
        const data = await apiFetch(`${CONFIG.AUTH_SERVICE_URL}/api/auth/me`);
        enterApp(data.user || data);
      } catch (_) {
        removeToken();
      }
    })();
  </script>
</body>

</html>
